<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 페이지 - 선호도 투표</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-wrap">
    <header class="admin-header">
      <div>
        <div class="admin-logo">🏛️ 대전광역시 인재개발원</div>
        <h1>신규자 교육 발표 선호도 투표 — 관리자</h1>
      </div>
    </header>

    <!-- 관리자 로그인 -->
    <section id="adminLoginSection" class="login-card">
      <h2>관리자 로그인</h2>
      <div class="form-group">
        <label for="adminPwInput">비밀번호</label>
        <input type="password" id="adminPwInput" placeholder="관리자 비밀번호 입력" />
      </div>
      <button class="btn btn-blue" id="adminLoginBtn">로그인</button>
    </section>

    <!-- 관리자 대시보드 -->
    <div id="adminDashboard" class="hidden">

      <!-- 현재 상태 표시줄 -->
      <div class="status-bar">
        <div id="sessionStatus" class="session-status">🔴 현재 진행 중인 투표 없음</div>
        <div class="status-bar-btns">
          <button class="btn btn-red" id="closeAllBtn">투표 닫기</button>
          <button class="btn btn-reset" id="resetBtn">🗑️ 결과 초기화</button>
        </div>
      </div>

      <!-- 탭 네비게이션 -->
      <div class="tab-nav">
        <button class="tab-btn active" data-tab="manage">⚙️ 관리</button>
        <button class="tab-btn" data-tab="results">🎬 결과 발표</button>
      </div>

      <!-- 초기화 확인 모달 -->
      <div id="resetModal" class="modal-overlay hidden">
        <div class="modal-box">
          <div class="modal-icon">⚠️</div>
          <h3>정말 초기화하시겠습니까?</h3>
          <p>모든 투표 결과와 투표자 기록이<br>영구적으로 삭제됩니다.</p>
          <div class="modal-btns">
            <button class="btn btn-gray" id="resetCancelBtn">취소</button>
            <button class="btn btn-red" id="resetConfirmBtn">초기화</button>
          </div>
        </div>
      </div>

      <!-- 관리 탭 -->
      <div id="tab-manage" class="tab-panel">
        <!-- 심사자 관리 -->
        <section class="section">
          <h2 class="section-title">👥 심사자 관리</h2>

          <!-- 직접 등록 -->
          <div class="participant-form">
            <input type="text" id="pNameInput" placeholder="이름" autocomplete="off" />
            <input type="text" id="pIdInput" placeholder="교번" autocomplete="off" />
            <button class="btn btn-blue" id="addParticipantBtn">등록</button>
          </div>

          <!-- 엑셀 업로드 -->
          <div class="excel-upload" id="excelDrop">
            <input type="file" id="excelFile" accept=".xlsx,.xls" />
            <label for="excelFile">
              <span class="upload-icon">📂</span>
              <span class="upload-text">엑셀 파일을 끌어다 놓거나 클릭하여 업로드<br><small>A열: 교번 &nbsp;|&nbsp; B열: 이름</small></span>
            </label>
          </div>

          <div class="participant-list" id="participantList">
            <p class="empty-msg">등록된 심사자가 없습니다.</p>
          </div>
        </section>

        <!-- 조별 카드 -->
        <section class="section">
          <h2 class="section-title">조별 투표 관리</h2>
          <div class="group-grid" id="groupGrid"></div>
        </section>

        <!-- 결과 테이블 -->
        <section class="section">
          <h2 class="section-title">📊 결과 현황</h2>
          <div class="table-wrap">
            <table class="results-table">
              <thead>
                <tr>
                  <th>조</th>
                  <th>투표 수</th>
                  <th>평균 점수</th>
                  <th>순위</th>
                </tr>
              </thead>
              <tbody id="resultsBody"></tbody>
            </table>
          </div>
        </section>
      </div>

      <!-- 결과 발표 탭 -->
      <div id="tab-results" class="tab-panel hidden">
        <div class="reveal-ready-box">
          <h2>결과 발표</h2>
          <div id="sessionBadge" class="session-badge waiting">🔴 투표 대기 중</div>
          <button id="revealBtn" class="reveal-btn">🎬 결과 공개</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 카운트다운 오버레이 -->
  <div id="countdownOverlay" class="fullscreen center hidden">
    <div id="cdText" class="cd-text"></div>
  </div>

  <!-- 결과 화면 -->
  <div id="resultsSection" class="fullscreen hidden">
    <header class="results-header">
      <div class="hdr-logo">🏛️ 대전광역시 인재개발원</div>
      <h1>신규자 교육 발표 선호도 투표 — 최종 결과</h1>
    </header>
    <div id="resultsGrid" class="results-grid"></div>
    <div class="results-back-wrap">
      <button id="resultsBackBtn" class="results-back-btn">← 관리자 페이지로 돌아가기</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script type="module" src="admin.js"></script>
</body>
</html>
